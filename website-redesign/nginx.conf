server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback - try index.html for client-side routing
    location / {
        try_files $uri $uri/ $uri/index.html /index.html;
    }

    # Videos - served from Docker mount at /videos/ (bind mount from host)
    # Optimized for streaming
    location /videos/ {
        alias /videos/;
        
        # CORS headers
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "*";
        
        # Optimize for large files
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        
        # Medium cache for videos (1 hour - allows updates without long cache)
        expires 1h;
        add_header Cache-Control "public";
    }

    # Status API proxy
    location /api/ {
        proxy_pass http://192.168.1.205:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Disable cache for HTML
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}