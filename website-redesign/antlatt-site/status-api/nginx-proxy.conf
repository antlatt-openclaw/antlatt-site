# Add this to your nginx.conf inside the server block
# This proxies /api/ requests to the status-api container

location /api/ {
    proxy_pass http://status-api:3001/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # CORS headers (in case the API doesn't add them)
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET' always;
    add_header 'Access-Control-Allow-Headers' 'Content-Type' always;
    
    # Cache for 30 seconds to avoid hammering the API
    proxy_cache_bypass $http_pragma $http_authorization;
    expires 30s;
}