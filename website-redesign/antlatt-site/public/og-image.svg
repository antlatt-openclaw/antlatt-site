<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#12121a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="accentVertical" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2a2a3a" stroke-width="0.5"/>
  </pattern>
  <rect width="100%" height="100%" fill="url(#grid)" opacity="0.4"/>
  
  <!-- Decorative circles -->
  <circle cx="1050" cy="150" r="180" fill="#6366f1" opacity="0.08"/>
  <circle cx="1100" cy="480" r="220" fill="#dc2626" opacity="0.06"/>
  <circle cx="100" cy="550" r="100" fill="#6366f1" opacity="0.05"/>
  
  <!-- Accent line -->
  <rect x="60" y="200" width="160" height="4" fill="url(#accent)" rx="2"/>
  
  <!-- Title -->
  <text x="60" y="300" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="80" font-weight="800" fill="#ffffff">
    ANTLATT
  </text>
  <text x="60" y="300" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="80" font-weight="800" fill="url(#accent)" dx="395">
    .COM
  </text>
  
  <!-- Tagline -->
  <text x="60" y="380" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="24" fill="#8888a0">
    Tech stuff, general geekery, and whatever else catches my attention.
  </text>
  
  <!-- Bottom gradient bar -->
  <rect y="600" width="100%" height="30" fill="url(#accent)" opacity="0.8"/>
  
  <!-- Code bracket decoration -->
  <text x="60" y="520" font-family="JetBrains Mono, monospace" font-size="18" fill="#6366f1" opacity="0.6">
    &lt;/
  </text>
  <text x="105" y="520" font-family="JetBrains Mono, monospace" font-size="18" fill="#dc2626" opacity="0.6">
    tech
  </text>
  <text x="155" y="520" font-family="JetBrains Mono, monospace" font-size="18" fill="#6366f1" opacity="0.6">
    &gt;
  </text>
</svg>