server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Trailing slash redirect with HTTPS
    rewrite ^([^.]*[^/])$ https://$host$1/ permanent;

    # SPA fallback - try index.html for client-side routing
    location / {
        try_files $uri $uri/ $uri/index.html /index.html;
    }

    # Videos - served from /usr/share/nginx/html/videos/
    # Optimized for streaming with range requests
    location /videos/ {
        alias /usr/share/nginx/html/videos/;
        
        # CORS headers
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "*";
        
        # Enable range requests for video streaming
        mp4;
        mp4_buffer_size 1m;
        mp4_max_buffer_size 5m;
        
        # Optimize for large files
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        
        # Medium cache for videos (1 hour - allows updates without long cache)
        expires 1h;
        add_header Cache-Control "public";
    }
    
    # Video poster images - preload for smoother transitions
    location /images/deepfakes/ {
        alias /usr/share/nginx/html/images/deepfakes/;
        
        # Enable CORS for preloading
        add_header Access-Control-Allow-Origin *;
        
        # Longer cache for poster images (1 day)
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # Search index API - static file serving
    location = /api/search-index.json {
        alias /usr/share/nginx/html/api/search-index.json;
        add_header Content-Type application/json;
        add_header Cache-Control "public, max-age=31536000";
    }

    # Status API proxy (other API endpoints)
    location ~ ^/api/status|/api/vitals$ {
        proxy_pass http://192.168.1.205:3001$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # Cache static assets (images, fonts, etc.) - 1 year for immutable assets
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # JS and CSS - 1 year with cache busting via hash in filenames
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Reasonable caching for HTML (1 hour with revalidation)
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
}
